<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming...</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />
    <style>
        body { background: #0d1117; color: white; text-align: center; font-family: sans-serif; }
        .container { width: 100%; max-width: 850px; margin: auto; padding: 10px; }
        .player-wrapper { position: relative; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .watermark { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); color: #1fd1f9; padding: 6px 14px; border-radius: 6px; font-weight: bold; border: 1px solid #1fd1f9; z-index: 10; pointer-events: none; }
        .details { background: #161b22; margin-top: 20px; padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .btn { padding: 14px; text-decoration: none; color: white; background: #21262d; border-radius: 8px; font-weight: bold; border: 1px solid #30363d; transition: 0.3s; }
        .btn:hover { background: #30363d; }
        .btn-blue { background: #0088cc; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="player-wrapper">
            <div class="watermark">{{ watermark }}</div>
            <video id="player" playsinline controls>
                <source src="{{ stream_url }}" type="video/mp4" />
            </video>
        </div>
        <div class="details">
            <h3 style="color:#1fd1f9;">📂 File Details</h3>
            <p>File ID: {{ file_id }}</p>
            <div class="btn-grid">
                <a href="vlc://{{ stream_url }}" class="btn">▶️ VLC Player</a>
                <a href="intent:{{ stream_url }}#Intent;package=com.mxtech.videoplayer.ad;end" class="btn">▶️ MX Player</a>
                <a href="{{ stream_url }}" class="btn">📥 ডাউনলোড করুন</a>
                <a href="https://t.me/{{ bot_username }}?start=file_{{ file_id }}" class="btn btn-blue">🆔 টেলিগ্রাম থেকে নিন</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>
    <script>const player = new Plyr('#player');</script>
</body>
</html>
